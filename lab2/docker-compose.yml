version: "3.9"

services:
  ansible-controller:
    build:
      context: ./ansible
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ansible:/ansible
    networks:
      - app_network

  app-runner:
    build:
      context: ./app
    volumes:
      - runner_volume:/app
    networks:
      - app_network
    entrypoint: ["/app/laba1.sh", "START"]

volumes:
  runner_volume:

networks:
  app_network:
    driver: bridge
