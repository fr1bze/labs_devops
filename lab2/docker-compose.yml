version: "3.9"

services:
  ansible-controller:
    build:
      context: ./ansible
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ansible:/ansible
    networks:
      - app_network

  app-runner:
    build:
      context: ./app
    volumes:
      - runner_volume:/app
    networks:
      - app_network
    depends_on:
      - app-builder
    entrypoint: /app/laba1.sh

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - app-runner
    networks:
      - app_network

volumes:
  builder_volume:
  runner_volume:

networks:
  app_network:
    driver: bridge
